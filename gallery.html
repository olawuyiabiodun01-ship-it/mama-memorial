<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery · Olawuyi Victoria Ayodele Arinke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a96e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>

<div class="page-hero">
  <p class="page-label">Photographs</p>
  <h1 class="page-title">A Life in Pictures</h1>
  <div class="page-divider"></div>
</div>

<div class="content">
  <div class="gallery-grid" id="gallery-grid">

    <!-- Existing local photos always show -->
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-28 233738.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-28 233801.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000029.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000054.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000121.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000156.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000214.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000236.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000256.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000312.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000347.jpg" alt="Mama"></div>
    <div class="gallery-item"><img loading="lazy" src="Screenshot 2026-06-29 000451.jpg" alt="Mama"></div>

    <!-- Supabase photos injected here by JS -->
  </div>
</div>

<div id="lightbox" role="dialog" aria-modal="true">
  <button id="lightbox-close" aria-label="Close">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<footer>
  <p>In loving memory of <span>Olawuyi Victoria Ayodele Arinke</span></p>
  <p style="margin-top:0.4rem;font-size:0.75rem;letter-spacing:0.12em;">23 May 1942 &nbsp;·&nbsp; 28 June 2014</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL  = 'https://apvslzcldlqzskawpzzk.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_8hgovw8SLg4S4ZR2-p26Sg_v3CGpTPg';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Load any admin-uploaded gallery photos from Supabase
  async function loadGalleryPhotos() {
    const { data } = await sb.from('gallery_photos').select('*').order('created_at', { ascending: false });
    if (!data || !data.length) return;
    const grid = document.getElementById('gallery-grid');
    data.forEach(p => {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.innerHTML = `<img loading="lazy" src="${p.url}" alt="${p.caption || 'Mama'}">`;
      div.addEventListener('click', () => {
        lightboxImg.src = p.url;
        lightboxImg.alt = p.caption || '';
        lightbox.classList.add('open');
      });
      grid.appendChild(div);
    });
  }
  loadGalleryPhotos();

  // Lightbox
  const lightbox    = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  document.getElementById('lightbox-close').onclick = () => lightbox.classList.remove('open');
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  // Wire up existing local photos to lightbox
  document.querySelectorAll('.gallery-item img').forEach(img => {
    img.parentElement.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add('open');
    });
  });
</script>
<script src="nav.js"></script>
</body>
</html>
